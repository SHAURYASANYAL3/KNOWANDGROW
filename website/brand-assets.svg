<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KNOW And GROW Brand Assets</title>
  <desc id="desc">Compact brand asset sheet showing the KNOW And GROW logo and color token palette.</desc>
  <style>
    .bg { fill: #f6f8f7; }
    .panel { fill: #ffffff; stroke: #d7e0dd; stroke-width: 1; }
    .mark { fill: #0f5a55; }
    .mark-accent { fill: #d06f2c; }
    .mark-secondary { fill: #3c786c; }
    .text { fill: #12211f; font-family: Inter, 'Segoe UI', sans-serif; }
    .text-muted { fill: #5b6a67; }
    .token-label { fill: #12211f; font-family: Inter, 'Segoe UI', sans-serif; font-size: 18px; }
    .token-hex { fill: #5b6a67; font-family: Inter, 'Segoe UI', sans-serif; font-size: 16px; }
    .swatch { stroke: #d7e0dd; stroke-width: 1; }
    .logo-large { font-size: 90px; font-weight: 900; letter-spacing: -0.04em; }
    .logo-small { font-size: 38px; font-weight: 600; letter-spacing: 0.2em; }
    .tagline { font-size: 22px; fill: #5b6a67; }
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="900" rx="32" />
  <rect class="panel" x="60" y="60" width="1080" height="780" rx="32" />

  <text class="logo-large text" x="92" y="170">KNOW</text>
  <text class="logo-small text" x="92" y="240">AND</text>
  <text class="logo-large mark-accent" x="210" y="170">GROW</text>
  <text class="tagline" x="92" y="295">A youth-led movement for safety, clarity, and accountable growth.</text>

  <g transform="translate(92, 350)">
    <rect class="swatch" x="0" y="0" width="190" height="130" fill="#0f5a55" rx="24" />
    <text class="token-label" x="220" y="40">Primary</text>
    <text class="token-hex" x="220" y="70">#0f5a55</text>

    <rect class="swatch" x="0" y="170" width="190" height="130" fill="#d06f2c" rx="24" />
    <text class="token-label" x="220" y="210">Accent</text>
    <text class="token-hex" x="220" y="240">#d06f2c</text>

    <rect class="swatch" x="0" y="340" width="190" height="130" fill="#3c786c" rx="24" />
    <text class="token-label" x="220" y="380">Secondary</text>
    <text class="token-hex" x="220" y="410">#3c786c</text>
  </g>

  <g transform="translate(520, 350)">
    <rect class="swatch" x="0" y="0" width="190" height="130" fill="#12211f" rx="24" />
    <text class="token-label" x="220" y="40">Text</text>
    <text class="token-hex" x="220" y="70">#12211f</text>

    <rect class="swatch" x="0" y="170" width="190" height="130" fill="#5b6a67" rx="24" />
    <text class="token-label" x="220" y="210">Muted</text>
    <text class="token-hex" x="220" y="240">#5b6a67</text>

    <rect class="swatch" x="0" y="340" width="190" height="130" fill="#ffffff" rx="24" stroke="#d7e0dd" />
    <text class="token-label" x="220" y="380">Surface</text>
    <text class="token-hex" x="220" y="410">#ffffff</text>
  </g>

  <g transform="translate(92, 560)">
    <rect x="0" y="0" width="1080" height="180" rx="28" fill="#ffffff" stroke="#d7e0dd" stroke-width="1" />
    <text class="token-label" x="40" y="48">Usage notes</text>
    <text class="text-muted" x="40" y="86" font-size="18px">Primary color anchors the brand and calls to action; accent adds warmth and urgency.</text>
    <text class="text-muted" x="40" y="116" font-size="18px">Secondary and muted tones support editorial layouts, while text remains high contrast for readability.</text>
    <text class="text-muted" x="40" y="146" font-size="18px">Surface is intentionally bright to keep the system airy and approachable across digital touchpoints.</text>
  </g>

  <g transform="translate(520, 96)">
    <rect x="0" y="0" width="400" height="210" rx="24" fill="#f3faf8" stroke="#d7e0dd" stroke-width="1" />
    <text class="token-label" x="24" y="40">Logo mark</text>
    <rect x="24" y="70" width="70" height="70" rx="18" fill="#0f5a55" />
    <path d="M65 112 l28 -45 l28 45" stroke="#d06f2c" stroke-width="10" fill="none" stroke-linecap="round" />
    <text class="token-hex" x="24" y="160">Simple, bold, and scalable: use in positive and reversed palettes.</text>
  </g>
</svg>
